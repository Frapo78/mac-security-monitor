name: Compatibility report
description: Report installation/runtime behavior on your macOS system.
title: "[Compatibility] "
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing Mac Security Monitor.
        Please share as many details as possible so we can improve compatibility.

  - type: dropdown
    id: cpu
    attributes:
      label: CPU architecture
      description: Select your Mac architecture.
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      description: Select your operating system version.
      options:
        - Ventura (13.x)
        - Sonoma (14.x)
        - Other (please describe below)
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - curl bootstrap installer
        - source repository installer
        - Homebrew tap/formula
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Commands executed
      description: Paste the exact commands you ran.
      placeholder: |
        security-monitor --version
        security-monitor self-test
        security-monitor
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output summary
      description: Paste relevant terminal output or logs.
      placeholder: Include failures, warnings, and any unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Security software, MDM, VPN, or anything else that might affect results.
